<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议预定系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .week-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
        }

        .week-controls h2 {
            color: #333;
            font-size: 1.3em;
        }

        .week-controls button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 0 5px;
        }

        .week-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .week-controls button:active {
            transform: translateY(0);
        }

        .calendar-view {
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .calendar-header {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            background: #2c3e50;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        .calendar-header .time-header {
            padding: 15px 10px;
            border-right: 1px solid #34495e;
        }

        .calendar-header .day-header {
            padding: 15px 10px;
            border-right: 1px solid #34495e;
        }

        .calendar-header .day-header:last-child {
            border-right: none;
        }

        .calendar-header .day-header.today {
            background: #e74c3c;
        }

        .calendar-body {
            max-height: 500px;
            overflow-y: auto;
        }

        .time-row {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            border-bottom: 1px solid #ecf0f1;
        }

        .time-row .time-slot {
            padding: 10px;
            background: #f8f9fa;
            border-right: 1px solid #ecf0f1;
            font-size: 0.9em;
            color: #7f8c8d;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .time-row .day-slot {
            min-height: 60px;
            border-right: 1px solid #ecf0f1;
            position: relative;
            background: white;
        }

        .time-row .day-slot:last-child {
            border-right: none;
        }

        .time-row .day-slot:hover {
            background: #f0f3f5;
        }

        .booking-block {
            position: absolute;
            left: 2px;
            right: 2px;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 10;
        }

        .booking-block:hover {
            transform: scale(1.02);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        .booking-block.room-1401 {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            border-left: 4px solid #1a5276;
        }

        .booking-block.room-1402 {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-left: 4px solid #922b21;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .form-section h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        .form-group input,
        .form-group select {
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .form-buttons button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .form-buttons button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .bookings-list {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .bookings-list h3 {
            color: #2c3e50;
            padding: 20px 25px;
            background: #f8f9fa;
            border-bottom: 3px solid #667eea;
            font-size: 1.5em;
        }

        .booking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .booking-table th,
        .booking-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        .booking-table th {
            background: #2c3e50;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }

        .booking-table tr:hover {
            background: #f8f9fa;
        }

        .booking-table tr:hover td {
            color: #2c3e50;
        }

        .room-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            font-size: 0.9em;
        }

        .room-badge.room-1401 {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .room-badge.room-1402 {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-edit {
            background: #3498db;
            color: white;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }

        .modal-header h3 {
            color: #2c3e50;
            font-size: 1.5em;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #2c3e50;
        }

        .legend-color {
            width: 30px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-color.room-1401 {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .legend-color.room-1402 {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }

        .notification.error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .calendar-header {
                font-size: 0.8em;
            }

            .calendar-header .time-header,
            .calendar-header .day-header {
                padding: 10px 5px;
            }

            .time-row .time-slot {
                font-size: 0.75em;
                padding: 5px;
            }

            .time-row .day-slot {
                min-height: 40px;
            }

            .booking-block {
                font-size: 0.7em;
                padding: 3px 5px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .booking-table {
                font-size: 0.85em;
            }

            .booking-table th,
            .booking-table td {
                padding: 10px 8px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .week-controls {
                flex-direction: column;
                gap: 10px;
            }

            .week-controls button {
                width: 100%;
                margin: 5px 0;
            }

            .booking-table {
                display: block;
                overflow-x: auto;
            }

            .action-buttons {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
                margin: 2px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 会议预定系统</h1>
            <p>高效管理您的会议室预订</p>
        </div>

        <div class="content">
            <!-- 周视图控制 -->
            <div class="week-controls">
                <button onclick="previousWeek()">◀ 上周</button>
                <h2 id="weekDisplay">2024年1月1日 - 1月7日</h2>
                <button onclick="nextWeek()">下周 ▶</button>
            </div>

            <!-- 日历视图 -->
            <div class="calendar-view">
                <div class="calendar-header" id="calendarHeader"></div>
                <div class="calendar-body" id="calendarBody"></div>
            </div>

            <!-- 图例 -->
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color room-1401"></div>
                    <span>会议室 1401</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color room-1402"></div>
                    <span>会议室 1402</span>
                </div>
            </div>

            <!-- 新增预订表单 -->
            <div class="form-section">
                <h3>📅 新增预订</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="bookingName">预订人</label>
                        <input type="text" id="bookingName" placeholder="请输入预订人姓名" required>
                    </div>
                    <div class="form-group">
                        <label for="roomSelect">会议室</label>
                        <select id="roomSelect" required>
                            <option value="">请选择会议室</option>
                            <option value="1401">会议室 1401</option>
                            <option value="1402">会议室 1402</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="startDate">开始日期</label>
                        <input type="date" id="startDate" required>
                    </div>
                    <div class="form-group">
                        <label for="startTime">开始时间</label>
                        <select id="startTime" required>
                            <option value="">请选择开始时间</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="endDate">结束日期</label>
                        <input type="date" id="endDate" required>
                    </div>
                    <div class="form-group">
                        <label for="endTime">结束时间</label>
                        <select id="endTime" required>
                            <option value="">请选择结束时间</option>
                        </select>
                    </div>
                </div>
                <div class="form-buttons">
                    <button class="btn-primary" onclick="addBooking()">✅ 添加预订</button>
                    <button class="btn-secondary" onclick="clearForm()">🔄 清空表单</button>
                </div>
            </div>

            <!-- 预订记录列表 -->
            <div class="bookings-list">
                <h3>📋 预订记录列表</h3>
                <table class="booking-table">
                    <thead>
                        <tr>
                            <th>预订人</th>
                            <th>会议室</th>
                            <th>开始时间</th>
                            <th>结束时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ 编辑预订</h3>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editBookingId">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="editBookingName">预订人</label>
                    <input type="text" id="editBookingName" required>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="editRoomSelect">会议室</label>
                    <select id="editRoomSelect" required>
                        <option value="1401">会议室 1401</option>
                        <option value="1402">会议室 1402</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="editStartDate">开始日期</label>
                    <input type="date" id="editStartDate" required>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="editStartTime">开始时间</label>
                    <select id="editStartTime" required>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="editEndDate">结束日期</label>
                    <input type="date" id="editEndDate" required>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="editEndTime">结束时间</label>
                    <select id="editEndTime" required>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="btn-primary" onclick="saveEdit()">保存修改</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentWeekStart = getMonday(new Date());
        let bookings = [];
        const timeSlots = generateTimeSlots();

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadBookings();
            initializeTimeSelects();
            initializeDateInputs();
            renderCalendar();
            renderBookingsList();
            updateWeekDisplay();
        });

        // 生成时间槽（每半小时）
        function generateTimeSlots() {
            const slots = [];
            for (let hour = 8; hour <= 18; hour++) {
                slots.push(`${hour.toString().padStart(2, '0')}:00`);
                if (hour < 18) {
                    slots.push(`${hour.toString().padStart(2, '0')}:30`);
                }
            }
            return slots;
        }

        // 初始化时间选择器
        function initializeTimeSelects() {
            const startSelect = document.getElementById('startTime');
            const endSelect = document.getElementById('endTime');
            const editStartSelect = document.getElementById('editStartTime');
            const editEndSelect = document.getElementById('editEndTime');

            [startSelect, endSelect, editStartSelect, editEndSelect].forEach(select => {
                select.innerHTML = '<option value="">请选择时间</option>';
                timeSlots.forEach(time => {
                    const option = document.createElement('option');
                    option.value = time;
                    option.textContent = time;
                    select.appendChild(option);
                });
            });
        }

        // 初始化日期输入
        function initializeDateInputs() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
            document.getElementById('endDate').value = today;
            document.getElementById('startDate').min = today;
            document.getElementById('endDate').min = today;
        }

        // 获取本周一
        function getMonday(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        // 获取本周日期数组
        function getWeekDays(startDate) {
            const days = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                days.push(date);
            }
            return days;
        }

        // 格式化日期
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        // 格式化日期显示
        function formatDisplayDate(date) {
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return `${months[date.getMonth()]}${date.getDate()}日 ${weekdays[date.getDay()]}`;
        }

        // 更新周显示
        function updateWeekDisplay() {
            const weekDays = getWeekDays(currentWeekStart);
            const startStr = `${weekDays[0].getFullYear()}年${weekDays[0].getMonth() + 1}月${weekDays[0].getDate()}日`;
            const endStr = `${weekDays[6].getMonth() + 1}月${weekDays[6].getDate()}日`;
            document.getElementById('weekDisplay').textContent = `${startStr} - ${endStr}`;
        }

        // 渲染日历
        function renderCalendar() {
            const header = document.getElementById('calendarHeader');
            const body = document.getElementById('calendarBody');
            const weekDays = getWeekDays(currentWeekStart);
            const today = new Date();

            // 渲染表头
            let headerHTML = '<div class="time-header">时间</div>';
            weekDays.forEach(day => {
                const isToday = formatDate(day) === formatDate(today);
                headerHTML += `<div class="day-header ${isToday ? 'today' : ''}">${formatDisplayDate(day)}</div>`;
            });
            header.innerHTML = headerHTML;

            // 渲染时间槽
            let bodyHTML = '';
            timeSlots.forEach(time => {
                bodyHTML += '<div class="time-row">';
                bodyHTML += `<div class="time-slot">${time}</div>`;

                weekDays.forEach(day => {
                    const dateStr = formatDate(day);
                    bodyHTML += `<div class="day-slot" data-date="${dateStr}" data-time="${time}"></div>`;
                });

                bodyHTML += '</div>';
            });
            body.innerHTML = bodyHTML;

            // 渲染预订块
            renderBookingBlocks(weekDays);
        }

        // 渲染预订块
        function renderBookingBlocks(weekDays) {
            const weekDates = weekDays.map(day => formatDate(day));

            bookings.forEach(booking => {
                if (!weekDates.includes(booking.startDate)) return;

                const daySlot = document.querySelector(`[data-date="${booking.startDate}"][data-time="${booking.startTime}"]`);
                if (!daySlot) return;

                // 计算持续时间（以半小时为单位）
                const duration = calculateDuration(booking.startTime, booking.endTime);
                const height = duration * 30; // 每半小时30px

                const block = document.createElement('div');
                block.className = `booking-block room-${booking.room}`;
                block.style.height = `${height}px`;
                block.textContent = `${booking.person} (${booking.room})`;
                block.onclick = () => openEditModal(booking.id);

                daySlot.appendChild(block);
            });
        }

        // 计算持续时间（半小时单位）
        function calculateDuration(startTime, endTime) {
            const startMinutes = timeToMinutes(startTime);
            const endMinutes = timeToMinutes(endTime);
            return (endMinutes - startMinutes) / 30;
        }

        // 时间转换为分钟
        function timeToMinutes(time) {
            const [hours, minutes] = time.split(':').map(Number);
            return hours * 60 + minutes;
        }

        // 加载预订数据
        function loadBookings() {
            const stored = localStorage.getItem('meetingBookings');
            if (stored) {
                bookings = JSON.parse(stored);
            }
        }

        // 保存预订数据
        function saveBookings() {
            localStorage.setItem('meetingBookings', JSON.stringify(bookings));
        }

        // 添加预订
        function addBooking() {
            const name = document.getElementById('bookingName').value.trim();
            const room = document.getElementById('roomSelect').value;
            const startDate = document.getElementById('startDate').value;
            const startTime = document.getElementById('startTime').value;
            const endDate = document.getElementById('endDate').value;
            const endTime = document.getElementById('endTime').value;

            // 验证输入
            if (!name || !room || !startDate || !startTime || !endDate || !endTime) {
                showNotification('请填写所有字段', 'error');
                return;
            }

            if (startDate > endDate) {
                showNotification('结束日期不能早于开始日期', 'error');
                return;
            }

            if (startDate === endDate && timeToMinutes(startTime) >= timeToMinutes(endTime)) {
                showNotification('结束时间必须晚于开始时间', 'error');
                return;
            }

            // 检查时间冲突
            if (hasTimeConflict(room, startDate, startTime, endDate, endTime)) {
                showNotification('该时间段已有预订，请选择其他时间', 'error');
                return;
            }

            const booking = {
                id: Date.now(),
                person: name,
                room: room,
                startDate: startDate,
                startTime: startTime,
                endDate: endDate,
                endTime: endTime
            };

            bookings.push(booking);
            saveBookings();
            clearForm();
            renderCalendar();
            renderBookingsList();
            showNotification('预订添加成功！', 'success');
        }

        // 检查时间冲突
        function hasTimeConflict(room, startDate, startTime, endDate, endTime, excludeId = null) {
            return bookings.some(booking => {
                if (booking.id === excludeId) return false;
                if (booking.room !== room) return false;

                // 检查日期重叠
                const dateOverlap = !(booking.endDate < startDate || booking.startDate > endDate);
                if (!dateOverlap) return false;

                // 如果是同一天，检查时间冲突
                if (booking.startDate === startDate && booking.endDate === endDate) {
                    const startMinutes = timeToMinutes(startTime);
                    const endMinutes = timeToMinutes(endTime);
                    const bookingStartMinutes = timeToMinutes(booking.startTime);
                    const bookingEndMinutes = timeToMinutes(booking.endTime);

                    return !(endMinutes <= bookingStartMinutes || startMinutes >= bookingEndMinutes);
                }

                // 跨日期预订简化处理
                return true;
            });
        }

        // 清空表单
        function clearForm() {
            document.getElementById('bookingName').value = '';
            document.getElementById('roomSelect').value = '';
            document.getElementById('startTime').value = '';
            document.getElementById('endTime').value = '';
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
            document.getElementById('endDate').value = today;
        }

        // 渲染预订列表
        function renderBookingsList() {
            const tbody = document.getElementById('bookingsTableBody');

            if (bookings.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-7 5h5v5h-5z"/>
                            </svg>
                            <p>暂无预订记录</p>
                        </td>
                    </tr>
                `;
                return;
            }

            // 按开始时间排序
            const sortedBookings = [...bookings].sort((a, b) => {
                if (a.startDate !== b.startDate) {
                    return a.startDate.localeCompare(b.startDate);
                }
                return a.startTime.localeCompare(b.startTime);
            });

            tbody.innerHTML = sortedBookings.map(booking => `
                <tr>
                    <td>${booking.person}</td>
                    <td><span class="room-badge room-${booking.room}">会议室 ${booking.room}</span></td>
                    <td>${booking.startDate} ${booking.startTime}</td>
                    <td>${booking.endDate} ${booking.endTime}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn btn-edit" onclick="openEditModal(${booking.id})">编辑</button>
                            <button class="action-btn btn-delete" onclick="deleteBooking(${booking.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 打开编辑模态框
        function openEditModal(bookingId) {
            const booking = bookings.find(b => b.id === bookingId);
            if (!booking) return;

            document.getElementById('editBookingId').value = booking.id;
            document.getElementById('editBookingName').value = booking.person;
            document.getElementById('editRoomSelect').value = booking.room;
            document.getElementById('editStartDate').value = booking.startDate;
            document.getElementById('editStartTime').value = booking.startTime;
            document.getElementById('editEndDate').value = booking.endDate;
            document.getElementById('editEndTime').value = booking.endTime;

            document.getElementById('editModal').classList.add('active');
        }

        // 关闭编辑模态框
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // 保存编辑
        function saveEdit() {
            const bookingId = parseInt(document.getElementById('editBookingId').value);
            const name = document.getElementById('editBookingName').value.trim();
            const room = document.getElementById('editRoomSelect').value;
            const startDate = document.getElementById('editStartDate').value;
            const startTime = document.getElementById('editStartTime').value;
            const endDate = document.getElementById('editEndDate').value;
            const endTime = document.getElementById('editEndTime').value;

            if (!name || !room || !startDate || !startTime || !endDate || !endTime) {
                showNotification('请填写所有字段', 'error');
                return;
            }

            if (startDate > endDate) {
                showNotification('结束日期不能早于开始日期', 'error');
                return;
            }

            if (startDate === endDate && timeToMinutes(startTime) >= timeToMinutes(endTime)) {
                showNotification('结束时间必须晚于开始时间', 'error');
                return;
            }

            // 检查时间冲突
            if (hasTimeConflict(room, startDate, startTime, endDate, endTime, bookingId)) {
                showNotification('该时间段已有预订，请选择其他时间', 'error');
                return;
            }

            const bookingIndex = bookings.findIndex(b => b.id === bookingId);
            if (bookingIndex !== -1) {
                bookings[bookingIndex] = {
                    id: bookingId,
                    person: name,
                    room: room,
                    startDate: startDate,
                    startTime: startTime,
                    endDate: endDate,
                    endTime: endTime
                };

                saveBookings();
                closeEditModal();
                renderCalendar();
                renderBookingsList();
                showNotification('预订修改成功！', 'success');
            }
        }

        // 删除预订
        function deleteBooking(bookingId) {
            if (confirm('确定要删除这个预订吗？')) {
                bookings = bookings.filter(b => b.id !== bookingId);
                saveBookings();
                renderCalendar();
                renderBookingsList();
                showNotification('预订已删除', 'success');
            }
        }

        // 上周
        function previousWeek() {
            currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            updateWeekDisplay();
            renderCalendar();
        }

        // 下周
        function nextWeek() {
            currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            updateWeekDisplay();
            renderCalendar();
        }

        // 显示通知
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideInRight 0.3s ease reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // 点击模态框外部关闭
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });

        // ESC键关闭模态框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
